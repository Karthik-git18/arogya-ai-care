<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arogya AI Care</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-page {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: gradient-shift 8s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, -50px); }
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: cardFloat 3s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            border-radius: 24px 24px 0 0;
        }

        .auth-card h1 {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #22c55e, #0ea5e9, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #b0b0b0;
            font-size: 16px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .toggle-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #b0b0b0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(34, 197, 94, 0.3);
        }

        .toggle-btn:hover:not(.active) {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #707070;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        @media (max-width: 600px) {
            .auth-card {
                padding: 40px 24px;
            }
            .auth-card h1 { font-size: 28px; }
        }
    </style>
</head>
<body class="login-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1>💙 Arogya</h1>
            <p class="subtitle">AI Health Care</p>

            <div class="toggle">
                <button class="toggle-btn active" data-mode="signin">Sign In</button>
                <button class="toggle-btn" data-mode="signup">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form class="auth-form active" id="signin-form" onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="signin-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔐 Password</label>
                    <input type="password" id="signin-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form class="auth-form" id="signup-form" onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="signup-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔐 Password</label>
                    <input type="password" id="signup-password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>


    <script>
        const toggles = document.querySelectorAll('.toggle-btn');
        const forms = document.querySelectorAll('.auth-form');
        const message = document.getElementById('message');

        toggles.forEach(btn => {
            btn.addEventListener('click', function() {
                toggles.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const mode = this.dataset.mode;
                forms.forEach(f => f.classList.remove('active'));
                document.getElementById(mode + '-form').classList.add('active');
                message.textContent = '';
                message.className = 'message';
            });
        });

        async function handleSignIn(e) {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    message.textContent = '✓ Login successful! Redirecting...';
                    message.className = 'message success';
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    message.textContent = '✗ ' + (data.error || 'Login failed');
                    message.className = 'message error';
                }
            } catch(err) {
                message.textContent = '✗ Error: ' + err.message;
                message.className = 'message error';
            }
        }

        async function handleSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    message.textContent = '✓ Account created! Switching to login...';
                    message.className = 'message success';
                    setTimeout(() => {
                        document.querySelector('[data-mode="signin"]').click();
                        message.textContent = '';
                    }, 1500);
                } else {
                    message.textContent = '✗ ' + (data.error || 'Registration failed');
                    message.className = 'message error';
                }
            } catch(err) {
                message.textContent = '✗ Error: ' + err.message;
                message.className = 'message error';
            }
        }
    </script>
</body>
</html>
