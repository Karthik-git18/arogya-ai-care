<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Arogya AI Care</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .onboarding {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .onboarding::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            animation: gradient-shift 12s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container-onboarding {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .slides-wrapper {
            position: relative;
            height: 500px;
            margin-bottom: 40px;
        }

        .slide {
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .slide-content {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .slide-content .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .slide-content h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slide-content p {
            font-size: 16px;
            color: #b0b0b0;
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot.active {
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
            transform: scale(1.2);
            width: 32px;
            border-radius: 6px;
        }

        .dot:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-secondary, .btn-primary {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #b0b0b0;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
            flex: 1;
            min-width: 160px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
        }

        @media (max-width: 600px) {
            .slides-wrapper { height: 400px; }
            .slide-content { padding: 40px 24px; }
            .slide-content h2 { font-size: 24px; }
            .slide-content .icon { font-size: 60px; }
            .controls { flex-wrap: wrap; }
            .btn-secondary { flex: 1; min-width: 120px; }
        }
    </style>
</head>
<body class="onboarding">
    <div class="container-onboarding">
        <div class="slides-wrapper">
            <div class="slide active">
                <div class="slide-content">
                    <div class="icon">🏥</div>
                    <h2>Health Tracking</h2>
                    <p>Track your health metrics with AI-powered insights and real-time analysis</p>
                </div>
            </div>
            <div class="slide">
                <div class="slide-content">
                    <div class="icon">🤖</div>
                    <h2>AI Intelligence</h2>
                    <p>Get personalized health recommendations powered by machine learning</p>
                </div>
            </div>
            <div class="slide">
                <div class="slide-content">
                    <div class="icon">💙</div>
                    <h2>Your Health Companion</h2>
                    <p>Complete healthcare in one place - symptom checker, chat, and more</p>
                </div>
            </div>
        </div>

        <div class="dots">
            <span class="dot active" onclick="showSlide(0)"></span>
            <span class="dot" onclick="showSlide(1)"></span>
            <span class="dot" onclick="showSlide(2)"></span>
        </div>

        <div class="controls">
            <button class="btn-secondary" onclick="skipOnboarding()">SKIP</button>
            <button class="btn-primary" onclick="nextSlide()">NEXT →</button>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        function showSlide(n) {
            if (n >= slides.length) {
                window.location.href = '/login';
                return;
            }
            if (n < 0) n = 0;
            
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            slides[n].classList.add('active');
            dots[n].classList.add('active');
            slideIndex = n;
        }

        function nextSlide() {
            showSlide(slideIndex + 1);
        }

        function skipOnboarding() {
            window.location.href = '/login';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') showSlide(slideIndex - 1);
        });

        showSlide(0);
    </script>
</body>
</html>
